name: OpenShift S2I Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xvf oc.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Switch Project
        run: |
          oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Trigger Build
        run: |
          oc start-build finalgello --follow

      - name: Get Latest Image Digest
        run: |
          IMAGE=$(oc get istag finalgello:latest -o jsonpath='{.image.dockerImageReference}')
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Update Knative Service (FORCE NEW REVISION)
        run: |
          oc patch ksvc finalgello \
          --type='merge' \
          -p "{\"spec\":{\"template\":{\"spec\":{\"containers\":[{\"image\":\"$IMAGE\"}]}}}}"